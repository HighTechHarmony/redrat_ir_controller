# RedRat IR Controller — runtime configuration

redrat:
  # USB device to use when multiple are connected. Leave blank to use the first found.
  serial_number: ""

flask:
  host: "0.0.0.0"
  port: 5000
  debug: false

storage:
  ir_codes: "config/ir_codes.yaml"
  macros: "config/macros.yaml"
  voice_commands: "config/voice_commands.yaml"

voice:
  # ALSA device name as shown by `arecord -L` or `python -m sounddevice`.
  # Use "" or "default" for the system default device.
  # alsa_device: "default"
  alsa_device: "hw:4,0"

  # openWakeWord model name (built-in) or path to a custom .onnx/.tflite file.
  # Built-in options usually include version suffixes like "hey_jarvis_v0.1".
  wake_word_model: "hey_jarvis_v0.1"

  # Detection score threshold (0.0–1.0). Lower = more sensitive but more false positives.
  wake_word_threshold: 0.3

  # Path to the extracted Vosk model directory.
  vosk_model_path: "models/vosk-model-small-en-us-0.15"

  # Seconds to listen for a command after the wake word before giving up.
  command_timeout_s: 5

  # Minimum rapidfuzz token_set_ratio score (0–100) to accept a command match.
  command_match_threshold: 70

  # Debug/logging options
  debug_wake: true
  wake_log_every: 1
  debug_audio: true
  audio_log_every: 1
